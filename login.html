<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MbudStore Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="brand">MbudStore</a>
      <button class="menu-toggle" aria-label="Toggle Menu"><span class="menu-icon"></span></button>
      <nav class="nav-menu">
        <ul>
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="sneakers.html" class="nav-link">Nike</a></li>
          <li><a href="running.html" class="nav-link">Converse</a></li>
          <li><a href="casual.html" class="nav-link">Adidas</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-primary" style="padding: 8px 16px; font-size: 14px;">Login</a>
        <a href="register.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 14px;">Register</a>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <main class="main-container flex-center">
      <section class="section reveal pt-40 w-100" style="margin-top: 40px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 900px; margin: 0 auto;">
          
          <!-- Login Card -->
          <div class="card-form" style="margin: 0;">
            <h2 class="text-center mb-24">Welcome Back</h2>
            <form id="loginForm">
              <div class="form-group">
                <label>Username</label>
                <input id="loginUser" autocomplete="username" class="form-control" type="text" required>
              </div>
              <div class="form-group">
                <label>Password</label>
                <input id="loginPass" autocomplete="current-password" class="form-control" type="password" required>
              </div>
              <div id="errLoginAuth" class="form-error"></div>
              <button type="submit" class="btn btn-primary w-100">Sign In</button>
              <div class="text-center mt-24" style="font-size: 14px; color: var(--text-secondary);">
                Don't have an account? <a href="register.html" style="color: #fff; text-decoration: underline;">Register here</a>
              </div>
            </form>
          </div>

          <!-- Forgot Password Card -->
          <div class="card-form" style="margin: 0; background: rgba(255,255,255,0.01);">
            <h2 class="text-center mb-24">Forgot Password</h2>
            <p class="text-center" style="margin-bottom: 24px; font-size: 14px;">Enter your email and we'll send you a link to reset your password.</p>
            <form id="forgotForm">
              <div class="form-group">
                <label>Email Address</label>
                <input id="forgotEmail" class="form-control" type="email" required placeholder="you@example.com">
                <div id="errForgot" class="form-error"></div>
              </div>
              <button type="submit" class="btn btn-outline w-100">Reset Password</button>
            </form>
          </div>

        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="brand">MbudStore</div>
        <div class="footer-copy">© 2026 Copyright - MbudStore. All rights reserved.</div>
      </div>
    </footer>
  </div>
</body>
</html>
