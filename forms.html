<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms Component Sheet - MbudStore Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="brand">MbudStore</a>
      <button class="menu-toggle" aria-label="Toggle Menu"><span class="menu-icon"></span></button>
      <nav class="nav-menu">
        <ul>
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="sneakers.html" class="nav-link">Nike</a></li>
          <li><a href="running.html" class="nav-link">Converse</a></li>
          <li><a href="casual.html" class="nav-link">Adidas</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 14px;">Login</a>
        <a href="register.html" class="btn btn-primary" style="padding: 8px 16px; font-size: 14px;">Register</a>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <main class="main-container flex-center">
      <section class="section reveal pt-40 w-100" style="margin-top: 40px;">
        <h2 class="text-center mb-24">Forms Collection Sheet (5 Forms)</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; margin: 0 auto;">
          
          <!-- Registration -->
          <div class="card-form" style="margin: 0; padding: 24px;">
            <h3 class="mb-24 text-center">1. Registration</h3>
            <form id="registerForm">
              <div class="form-group">
                <label>Username</label>
                <input id="regUsername" class="form-control" type="text">
                <div id="charCount" class="small" style="text-align: right; color: var(--text-muted); font-size: 11px;">0 chars</div>
                <div id="errRegUser" class="form-error"></div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input id="regEmail" class="form-control" type="email">
                <div id="errRegEmail" class="form-error"></div>
              </div>
              <div class="form-group">
                <label>Password</label>
                <input id="regPass" class="form-control" type="password">
                <div id="errRegPass" class="form-error"></div>
              </div>
              <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
          </div>

          <!-- Login -->
          <div class="card-form" style="margin: 0; padding: 24px;">
            <h3 class="mb-24 text-center">2. Login</h3>
            <form id="loginForm">
              <div class="form-group">
                <label>User</label>
                <input id="loginUser" class="form-control" type="text">
              </div>
              <div class="form-group">
                <label>Password</label>
                <input id="loginPass" class="form-control" type="password">
              </div>
              <div id="errLoginAuth" class="form-error"></div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>

          <!-- Forgot Password -->
          <div class="card-form" style="margin: 0; padding: 24px;">
            <h3 class="mb-24 text-center">3. Forgot Password</h3>
            <form id="forgotForm">
              <div class="form-group">
                <label>Email</label>
                <input id="forgotEmail" class="form-control" type="email">
                <div id="errForgot" class="form-error"></div>
              </div>
              <button type="submit" class="btn btn-outline w-100">Reset Password</button>
            </form>
          </div>

          <!-- Contact Us -->
          <div class="card-form" style="margin: 0; padding: 24px;">
            <h3 class="mb-24 text-center">4. Contact Us</h3>
            <form id="contactForm2">
              <div class="form-group">
                <label>Your Name</label>
                <input id="cName" class="form-control" type="text">
              </div>
              <div class="form-group">
                <label>Message</label>
                <textarea id="cMsg" class="form-control" rows="3"></textarea>
              </div>
              <div class="form-group">
                <label>Preferred Size</label>
                <select id="sizeSelect" class="form-control">
                  <option value=''>-- select --</option>
                  <option>6</option>
                  <option>7</option>
                  <option>8</option>
                  <option>9</option>
                </select>
                <div id="sizeInfo" class="small mt-1" style="color: var(--text-muted); font-size: 11px;"></div>
              </div>
              <button class="btn btn-primary w-100 btn-action" data-action="Send Message">Send</button>
            </form>
          </div>

          <!-- Purchase -->
          <div class="card-form" style="margin: 0; padding: 24px;">
            <h3 class="mb-24 text-center">5. Purchase</h3>
            <form id="purchaseForm">
              <div class="form-group">
                <label>Item</label>
                <select id="itemSel" class="form-control">
                  <option>Sneaker A</option>
                  <option>Runner B</option>
                </select>
              </div>
              <div class="form-group">
                <label>Quantity</label>
                <input id="qty" type="number" class="form-control" value="1">
                <div id="errQty" class="form-error"></div>
              </div>
              <div class="form-group">
                <label>Payment</label>
                <div class="radio-group" style="flex-direction: column;">
                  <label class="radio-label"><input type="radio" name="pay" value="card" checked> Card</label>
                  <label class="radio-label"><input type="radio" name="pay" value="cod"> COD</label>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">Buy Now</button>
            </form>
          </div>

        </div>
      </section>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Small script specifically for contactForm2 to prevent default
      const btn = document.querySelector('#contactForm2 .btn-action');
      if(btn) {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          // Action handled in main.js generically
        });
      }
    });
  </script>
</body>
</html>
